<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Club</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6f8;
        }

        header {
            background: #0a58ca;
            color: white;
            padding: 15px 30px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="/club">🏠 Inicio</a></li>
            <li><a href="/club/deportistas">👥 Deportistas</a></li>
            <li><a href="/club/inscripciones">📋 Inscripciones</a></li>

            <li><a href="/logout">🚪 Salir</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
