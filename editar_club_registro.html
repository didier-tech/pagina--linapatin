{% extends "admin/base_admin.html" %}
{% block content %}

<h2>Editar club</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="nombre" value="{{ club.nombre }}" required>

    <label>
        <input type="checkbox" name="afiliado" value="1"
               {% if club.afiliado %}checked{% endif %}>
        Afiliado a la liga
    </label>

    <br><br>

    <button class="btn" type="submit">Guardar</button>
    <a href="/admin/clubes-registro">Cancelar</a>
</form>

{% endblock %}
