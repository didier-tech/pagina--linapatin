{% extends "base.html" %}

{% block title %}Seguridad | Actualizar Contraseña{% endblock %}

{% block content %}
<style>
    .security-container {
        max-width: 500px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .security-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border: none;
    }

    .security-header {
        background: #003366; /* Azul institucional */
        color: white;
        padding: 40px 20px;
        text-align: center;
    }

    .security-header i {
        font-size: 3rem;
        margin-bottom: 15px;
        opacity: 0.9;
    }

    .security-header h2 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 1px;
        color: white;
    }

    .security-body {
        padding: 30px;
    }

    .instruction-text {
        color: #718096;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        font-size: 0.8rem;
        color: #2d3748;
        text-transform: uppercase;
        margin-bottom: 8px;
        text-align: left;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #a0aec0;
    }

    .form-control-custom {
        width: 100%;
        padding: 12px 12px 12px 40px;
        border: 2px solid #edf2f7;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    .form-control-custom:focus {
        border-color: #003366;
        outline: none;
        box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
    }

    .btn-save {
        width: 100%;
        background: #003366;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
    }

    .btn-save:hover {
        background: #002244;
    }

    .btn-back {
        display: block;
        text-align: center;
        width: 100%;
        padding: 12px;
        color: #718096;
        text-decoration: none;
        font-size: 0.9rem;
        margin-top: 10px;
        transition: color 0.3s;
    }

    .btn-back:hover {
        color: #2d3748;
    }

    .alert-custom {
        padding: 12px;
        background: #fff5f5;
        border-left: 4px solid #f56565;
        color: #c53030;
        font-size: 0.9rem;
        border-radius: 4px;
        margin-bottom: 20px;
        text-align: left;
    }
</style>

<div class="security-container">
    <div class="security-card">
        <div class="security-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Seguridad de la Cuenta</h2>
        </div>

        <div class="security-body">
            <p class="instruction-text">Actualiza tu contraseña para mantener tu cuenta de <b>{{ session.user.usuario }}</b> protegida.</p>

            {% if error %}
            <div class="alert-custom">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/perfil/cambiar-password" method="POST">
                <div class="form-group">
                    <label>Contraseña Actual</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock-open"></i>
                        <input type="password" name="password_actual" class="form-control-custom" placeholder="Ingresa clave actual" required>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 30px 0;">

                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" name="password_nueva" class="form-control-custom" placeholder="Nueva clave (mín. 4 caracteres)" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-double"></i>
                        <input type="password" name="password_confirmacion" class="form-control-custom" placeholder="Repite la nueva clave" required>
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                
                <a href="javascript:history.back()" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Cancelar y Volver
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
