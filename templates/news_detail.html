{% extends "base.html" %}

{% block title %}{{ noticia.title }} | LINAPATIN{% endblock %}

{% block content %}
<div class="news-page-wrapper" style="background-color: #f9f9f9; padding: 40px 0;">
    <div class="container" style="max-width: 850px !important; margin: 0 auto !important; float: none !important;">
        <article class="news-full-card" style="background: white !important; padding: 40px !important; border-radius: 15px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important; width: 100% !important;">
            
            <header style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2.8rem !important; color: #003366 !important; margin-bottom: 10px !important; line-height: 1.2 !important;">
                    {{ noticia.title }}
                </h1>
                <p style="color: #888; font-weight: bold;">📅 {{ noticia.created_at }}</p>
            </header>

            {% if noticia.image %}
                <div class="main-photo-container" style="margin-bottom: 30px; text-align: center;">
                    <img src="{{ url_for('static', filename='uploads/noticias/' ~ noticia.image) }}" 
                         style="max-width: 100% !important; height: auto !important; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                </div>
            {% endif %}

            <div class="noticia-content-rendered" style="line-height: 1.8 !important; font-size: 1.2rem !important; color: #333 !important;">
                {{ noticia.content | safe }}
            </div>

            <div style="margin-top: 50px; border-top: 2px solid #eee; padding-top: 20px; text-align: center;">
                <a href="/" style="text-decoration: none; color: #003366; font-weight: bold; font-size: 1.1rem; border: 2px solid #003366; padding: 10px 25px; border-radius: 8px;">
                    ← Volver al inicio
                </a>
            </div>
        </article>
    </div>
</div>

<style>
    .noticia-content-rendered img { max-width: 100% !important; height: auto !important; display: block !important; margin: 25px auto !important; border-radius: 8px !important; }
    .noticia-content-rendered ul, .noticia-content-rendered ol { padding-left: 40px !important; margin-bottom: 20px !important; }
    .noticia-content-rendered p { margin-bottom: 20px !important; }
</style>
{% endblock %}
