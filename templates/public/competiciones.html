{% extends "base.html" %}
{% block content %}

<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; flex-wrap: wrap; gap: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px;">
        <h2 style="margin: 0; color: #1a1a1a; font-size: 2rem; font-weight: 800;">📅 Calendario de Eventos</h2>

        <a href="/resultados" style="
            background: #ff8800; 
            color: white; 
            text-decoration: none; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-weight: bold; 
            display: flex; 
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 136, 0, 0.3);
            transition: all 0.3s ease;"
            onmouseover="this.style.background='#e67a00'; this.style.transform='scale(1.05)';"
            onmouseout="this.style.background='#ff8800'; this.style.transform='scale(1)';"
        >
            <span style="margin-right: 10px; font-size: 1.2rem;">🏆</span> CONSULTAR RESULTADOS
        </a>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:35px;">

    {% for c in competencias %}
    <div class="event-card" style="
        background: #fff; 
        border-radius: 20px; 
        overflow: hidden; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        transition: all 0.3s ease; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center;
        border: 1px solid #f0f0f0;"
        onmouseover="this.style.transform='translateY(-10px)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.1)';"
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 25px rgba(0,0,0,0.05)';"
    >

        <div style="width: 100%; position: relative;">
            {% if c.flyer %}
                <a href="/competencias/{{ c.id }}">
                    <img src="{{ url_for('static', filename='uploads/flyers/' + c.flyer) }}" 
                         style="width:100%; height:220px; object-fit:cover; display: block;">
                </a>
            {% else %}
                <div style="width: 100%; height: 220px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 3rem;">
                    🛼
                </div>
            {% endif %}
            <div style="position: absolute; bottom: -15px; right: 20px; background: #007bff; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,123,255,0.3);">
                OFICIAL
            </div>
        </div>

        <div style="padding: 30px 20px 25px 20px; width: 100%; box-sizing: border-box;">
            <h3 style="margin: 0 0 15px 0; color: #2d3436; font-size: 1.4rem; line-height: 1.2;">{{ c.nombre }}</h3>
            
            <div style="margin-bottom: 20px; font-size: 0.95rem; color: #636e72;">
                <p style="margin: 5px 0; display: flex; align-items: center; justify-content: center;">
                    <span style="margin-right: 8px;">📍</span> {{ c.lugar }}
                </p>
                <p style="margin: 5px 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #007bff;">
                    <span style="margin-right: 8px;">📅</span> {{ c.fecha_evento }}
                </p>
            </div>

            <a href="/competencias/{{ c.id }}" style="
                display: block; 
                text-decoration: none; 
                background: #f1f2f6; 
                color: #2d3436; 
                padding: 12px; 
                border-radius: 12px; 
                font-weight: bold; 
                transition: 0.2s;"
                onmouseover="this.style.background='#007bff'; this.style.color='white';"
                onmouseout="this.style.background='#f1f2f6'; this.style.color='#2d3436';"
            >
                Ver detalles del evento
            </a>
        </div>

    </div>
    {% endfor %}

    </div>
</div>

{% endblock %}
