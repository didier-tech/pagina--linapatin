{% extends "base.html" %}
{% block title %}Información | LINAPATIN{% endblock %}

{% block content %}

<section class="container">
    <div class="info-grid">

        {% for item in info %}
        <div class="info-card">
            <h3>{{ item.titulo }}</h3>

            <a href="{{ url_for('static', filename='uploads/info/' ~ item.archivo) }}"
               target="_blank"
               class="info-btn">
               CONSULTAR
            </a>
        </div>
        {% endfor %}

    </div>
</section>

{% endblock %}
